appId: com.opencowork.app
productName: Open Cowork
copyright: Copyright © 2026 Open Cowork Team

directories:
  output: release
  buildResources: resources

npmRebuild: true

files:
  - dist/**/*
  - dist-electron/**/*
  - dist-mcp/**/*
  - package.json
  - node_modules/@img/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/@anthropic-ai/sdk/**/*
  - node_modules/@larksuiteoapi/**/*
  - node_modules/openai/**/*
  - node_modules/@modelcontextprotocol/**/*
  - node_modules/electron-updater/**/*
  - node_modules/chokidar/**/*
  - node_modules/archiver/**/*
  - node_modules/ngrok/**/*
  - node_modules/ws/**/*
  - node_modules/glob/**/*
  - node_modules/dotenv/**/*
  - .claude/skills/**/*

# MCP servers (compiled JavaScript files, cross-platform)
extraResources:
  - from: dist-mcp
    to: mcp
    filter:
      - "**/*"

# Unpack skills so they can be read/written at runtime
# Sharp native modules must also be unpacked for image processing
# Note: MCP servers are now bundled with esbuild, so no need to unpack MCP SDK
asarUnpack:
  - node_modules/@img/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/bufferutil/**/*
  - node_modules/utf-8-validate/**/*
  - .claude/skills/**/*

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-win-${arch}.${ext}
  signAndEditExecutable: false
  extraResources:
    - from: resources/node/win32-x64
      to: node
      filter:
        - "**/*"
    - from: dist-wsl-agent
      to: wsl-agent
      filter:
        - "**/*"

mac:
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  identity: auto
  hardenedRuntime: true
  gatekeeperAssess: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  extendInfo:
    LSApplicationCategoryType: public.app-category.developer-tools
  extraResources:
    - from: resources/node/darwin-${arch}
      to: node
      filter:
        - "**/*"
    # Bundled Python runtime + site-packages for GUI automation helpers (Pillow, pyobjc/Quartz)
    - from: resources/python/darwin-${arch}
      to: python
      filter:
        - "**/*"
    # Bundled GUI helper tools (e.g. cliclick) to avoid relying on user-installed Homebrew tools
    - from: resources/tools/darwin-${arch}
      to: tools
      filter:
        - "**/*"
    - from: dist-lima-agent
      to: lima-agent
      filter:
        - "**/*"

linux:
  icon: resources/icon.png
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
  extraResources:
    - from: resources/node/linux-x64
      to: node
      filter:
        - "**/*"
    - from: resources/python/linux-${arch}
      to: python
      filter:
        - "**/*"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

dmg:
  window:
    width: 600
    height: 440
  contents:
    - x: 150
      y: 220
      name: "Open Cowork.app"
    - x: 450
      y: 220
      type: link
      path: /Applications
      name: "Applications"

extraMetadata:
  main: dist-electron/main/index.js

publish:
  provider: github
  owner: OpenCoworkAI
  repo: open-cowork
